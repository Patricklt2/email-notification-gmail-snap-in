# For reference: https://docs.devrev.ai/snap-ins/references/manifest.
# email-notification-gmail — Gmail via Google APIs (OAuth2 refresh token)

version: "2"
name: "email-notification-gmail"
description: "Send email via Gmail when triggered as a workflow action node (Google OAuth2)."

service_account:
  display_name: email-notification-gmail
  scopes:
    self:
      - scope: artifact:read
        optional: false
        reason: Read DevRev artifacts to attach files to Gmail emails sent via the snap-in.

developer_keyrings:
  - name: gmail-oauth-secret
    description: Google OAuth client secret
    display_name: Gmail OAuth Secret

keyring_types:
  - id: gmail-oauth
    name: Gmail Connection
    description: Gmail OAuth2 Connection
    kind: oauth2
    external_system_name: Gmail

    scopes:
      - name: gmail_modify
        description: Read and modify Gmail messages and labels
        value: "https://www.googleapis.com/auth/gmail.modify"

      - name: gmail_send
        description: Send Gmail messages
        value: "https://www.googleapis.com/auth/gmail.send"

    scope_delimiter: " "
    oauth_secret: gmail-oauth-secret

    authorize:
      type: config
      grant_type: authorization_code
      auth_url: "https://accounts.google.com/o/oauth2/auth"
      token_url: "https://oauth2.googleapis.com/token"

      auth_query_parameters:
        client_id: "[CLIENT_ID]"
        scope: "[SCOPES]"
        response_type: "code"
        access_type: "offline"
        prompt: "consent"

      token_query_parameters:
        client_id: "[CLIENT_ID]"
        client_secret: "[CLIENT_SECRET]"
        scope: "[SCOPES]"

    refresh:
      type: config
      url: "https://oauth2.googleapis.com/token"
      method: POST

      query_parameters:
        client_id: "[CLIENT_ID]"
        client_secret: "[CLIENT_SECRET]"
        refresh_token: "[REFRESH_TOKEN]"
        scope: "[SCOPES]"

      headers:
        Content-Type: "application/x-www-form-urlencoded"

functions:
  - name: operation_handler
    description: Handles workflow action operations (send Gmail).

operations:
  - name: send_gmail_email
    display_name: Send Gmail email
    slug: send_gmail_email
    function: operation_handler
    description: Sends an email via Gmail API using OAuth2 credentials from the keyring.
    type: action
    keyrings:
      - name: gmail_oauth
        display_name: Gmail OAuth
        description: Google OAuth client ID, secret, redirect URI, and refresh token for Gmail API.
        types:
          - gmail-oauth
    inputs:
      fields:
        - name: to
          description: Recipient addresses, comma-separated. Supports Name <email@domain.com> or email@domain.com.
          field_type: text
          is_required: true
          ui:
            display_name: To
        - name: cc
          description: CC addresses, comma-separated (optional).
          field_type: text
          is_required: false
          ui:
            display_name: CC
        - name: bcc
          description: BCC addresses, comma-separated (optional).
          field_type: text
          is_required: false
          ui:
            display_name: BCC
        - name: subject
          description: Email subject.
          field_type: text
          is_required: true
          ui:
            display_name: Subject
        - name: body
          description: Email body. Use HTML when body_format is html; plain text when body_format is plain.
          field_type: text
          is_required: true
          ui:
            display_name: Body
        - name: body_format
          description: Whether the body is HTML or plain text.
          field_type: enum
          allowed_values:
            - html
            - plain
          is_required: false
          default_value: "html"
          ui:
            display_name: Body format
        - name: artifact_ids
          description: >-
            Artifacts to attach (max 10). Total size must not exceed 25 MB. .eml files are blocked.
          base_type: id
          field_type: array
          id_type:
            - artifact
          is_required: false
          ui:
            display_name: Attachments
    outputs:
      fields:
        - name: success
          field_type: bool
          is_required: true
          default_value: false
          ui:
            display_name: Success
        - name: error_message
          field_type: text
          is_required: false
          ui:
            display_name: Error message
